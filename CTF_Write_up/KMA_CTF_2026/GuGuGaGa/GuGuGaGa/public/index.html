<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>gugu gaga</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: "Comic Sans MS", cursive;
    }

    body::before {
      content: "gugu gaga";
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.08);
      font-size: 15vw;
      font-weight: 900;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .gif {
      position: absolute;
      width: var(--size);
      height: auto;
      image-rendering: auto;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.35));
      animation: bob var(--dur) ease-in-out infinite alternate;
    }

    .gif:nth-child(1) { left: 5%;  top: 8%;  --size: 180px; --dur: 1.8s; }
    .gif:nth-child(2) { left: 70%; top: 10%; --size: 130px; --dur: 2.2s; }
    .gif:nth-child(3) { left: 28%; top: 34%; --size: 220px; --dur: 2.6s; }
    .gif:nth-child(4) { left: 78%; top: 55%; --size: 170px; --dur: 2.0s; }
    .gif:nth-child(5) { left: 10%; top: 65%; --size: 140px; --dur: 1.7s; }
    .gif:nth-child(6) { left: 52%; top: 72%; --size: 200px; --dur: 2.4s; }
    .gif:nth-child(7) { left: 42%; top: 5%;  --size: 110px; --dur: 2.1s; }
    .gif:nth-child(8) { left: 84%; top: 30%; --size: 120px; --dur: 1.9s; }

    @keyframes bob {
      from {
        transform: translateY(0) scale(1);
      }
      to {
        transform: translateY(-22px) scale(1.04);
      }
    }

    .text {
      position: fixed;
      z-index: 10;
      color: white;
      font-size: clamp(36px, 8vw, 120px);
      font-weight: 900;
      text-shadow:
        4px 4px 0 red,
        -4px -4px 0 blue,
        0 0 18px yellow;
      pointer-events: none;
      animation: blink 0.6s steps(2, end) infinite;
    }

    .t1 { left: 4%; bottom: 4%; }
    .t2 { right: 5%; top: 42%; transform: rotate(12deg); }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.35; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">
  <img class="gif" src="/gugugaga-penguin.gif">

  <div class="text t1">gugu</div>
  <div class="text t2">gaga</div>
</body>
</html>
